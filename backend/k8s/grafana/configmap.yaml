apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: backend
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.backend.svc.cluster.local:3100
        isDefault: true
        jsonData:
          maxLines: 1000
